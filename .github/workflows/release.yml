name: Release

# Push a version tag (e.g. `git tag v0.1.1 && git push origin v0.1.1`) to:
#   1. build the sdist + wheel,
#   2. publish to PyPI via Trusted Publishing (OIDC — no token/secret needed),
#   3. cut the matching GitHub release.
#
# One-time setup on PyPI: project `switchboard-llm` -> Manage -> Publishing ->
# add a GitHub trusted publisher with owner `archit0`, repo `switchboard`,
# workflow `release.yml`, environment `pypi`. No GitHub secrets required.
#
# Bump `__version__` in src/switchboard/__init__.py to match the tag before tagging.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/switchboard-llm/
    permissions:
      id-token: write # OIDC -> PyPI Trusted Publishing (no token)
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create the release
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "switchboard-llm ${{ github.ref_name }}" \
            --generate-notes
